app-id: com.CokieMiner.AnaFis
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: anafis

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --socket=session-bus

modules:
  - name: anafis
    buildsystem: simple
    build-commands:
      - install -Dm755 AnaFis /app/bin/anafis
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.CokieMiner.AnaFis.png
      # Reuse the app icon as the file-type icon (MIME type icon name = MIME type with / → -)
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/mimetypes/application-x-anafis-spreadsheet.png
      - install -Dm644 com.CokieMiner.AnaFis.desktop /app/share/applications/com.CokieMiner.AnaFis.desktop
      - install -Dm644 com.CokieMiner.AnaFis.metainfo.xml /app/share/metainfo/com.CokieMiner.AnaFis.metainfo.xml
      - install -Dm644 com.CokieMiner.AnaFis-mime.xml /app/share/mime/packages/com.CokieMiner.AnaFis.xml
    sources:
      - type: file
        path: ../../../AnaFis/src-tauri/target/release/AnaFis
      - type: file
        path: icon.png
      - type: file
        path: com.CokieMiner.AnaFis.desktop
      - type: file
        path: com.CokieMiner.AnaFis.metainfo.xml
      - type: file
        path: com.CokieMiner.AnaFis-mime.xml
